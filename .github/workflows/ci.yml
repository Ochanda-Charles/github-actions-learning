name: CI
run-name: CI run by @${{ github.actor }} on ${{ github.ref_name }}

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "ad-hoc verification"
  schedule:
    # Every Monday at 09:00 UTC — a "weekly health check" against the latest deps
    - cron: "0 9 * * 1"

jobs:
  test:
    name: Test on Node 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
